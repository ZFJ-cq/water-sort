<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>倒水排序 - 闯关游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .game-container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .header .level, .header .moves {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header .level span, .header .moves span {
            font-size: 14px;
            opacity: 0.9;
        }

        .header .level strong, .header .moves strong {
            font-size: 18px;
            font-weight: bold;
        }

        .bottle-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .bottle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bottle-wrapper:hover {
            transform: scale(1.05);
        }

        .bottle-wrapper.selected {
            transform: scale(1.1);
        }

        .bottle-wrapper.selected .bottle {
            box-shadow: 0 0 20px rgba(255,255,255,0.6);
        }

        .bottle {
            width: 55px;
            height: 100px;
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 0 0 25px 25px;
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            transition: box-shadow 0.2s;
        }

        .bottle .neck {
            width: 30px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.8);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            position: absolute;
            top: -23px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.1);
        }

        .liquid {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            transition: height 0.3s ease;
            border-radius: 0 0 22px 22px;
        }

        .bottle-label {
            margin-top: 8px;
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }

        .empty-bottle .liquid {
            display: none;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: #333;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 90%;
            transform: scale(0.8);
            transition: transform 0.3s;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #333;
        }

        .modal p {
            color: #666;
            margin-bottom: 20px;
            font-size: 16px;
        }

        .modal .stars {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .modal .star {
            font-size: 36px;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .modal .star.active {
            opacity: 1;
            color: #ffd700;
        }

        .modal .btn {
            width: 100%;
            margin-bottom: 10px;
        }

        .level-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .level-item {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .level-item:hover {
            transform: scale(1.1);
            background: rgba(255,255,255,0.3);
        }

        .level-item.current {
            background: rgba(255,255,255,0.5);
            border-color: white;
        }

        .level-item.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .level-item.completed {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        @media (max-width: 400px) {
            .bottle {
                width: 48px;
                height: 85px;
            }
            
            .bottle .neck {
                width: 25px;
                height: 15px;
                top: -18px;
            }
            
            .bottle-container {
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>💧 倒水排序</h1>
            <div class="level-info">
                <div class="level">
                    <span>关卡</span>
                    <strong id="level-num">1</strong>
                </div>
                <div class="moves">
                    <span>步数</span>
                    <strong id="moves-num">0</strong>
                </div>
            </div>
        </div>

        <div class="bottle-container" id="bottle-container"></div>

        <div class="controls">
            <button class="btn btn-secondary" onclick="showLevelSelector()">📋 选关</button>
            <button class="btn btn-warning" onclick="resetLevel()">🔄 重玩</button>
            <button class="btn btn-primary" onclick="nextLevel()">➡️ 下一关</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <h2 id="modal-title">🎉 恭喜过关！</h2>
            <div class="stars" id="stars">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
            </div>
            <p id="modal-message">你用了 X 步完成本关！</p>
            <button class="btn btn-primary" onclick="closeModal(); nextLevel()">下一关</button>
            <button class="btn btn-secondary" onclick="closeModal(); resetLevel()">重玩本关</button>
        </div>
    </div>

    <div class="modal-overlay" id="level-modal-overlay">
        <div class="modal" id="level-modal">
            <h2>📋 选择关卡</h2>
            <div class="level-selector" id="level-selector"></div>
            <button class="btn btn-secondary" onclick="closeLevelModal()" style="margin-top: 20px;">关闭</button>
        </div>
    </div>

    <script>
        const COLORS = [
            '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', 
            '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F',
            '#BB8FCE', '#85C1E9', '#F8B500', '#FF69B4'
        ];

        const LEVELS = [
            { bottles: 4, rows: 2, colors: 2 },
            { bottles: 5, rows: 2, colors: 3 },
            { bottles: 6, rows: 3, colors: 3 },
            { bottles: 6, rows: 3, colors: 4 },
            { bottles: 7, rows: 3, colors: 4 },
            { bottles: 7, rows: 4, colors: 4 },
            { bottles: 8, rows: 4, colors: 4 },
            { bottles: 8, rows: 4, colors: 5 },
            { bottles: 9, rows: 4, colors: 5 },
            { bottles: 9, rows: 4, colors: 6 },
            { bottles: 10, rows: 5, colors: 5 },
            { bottles: 10, rows: 5, colors: 6 },
            { bottles: 11, rows: 5, colors: 6 },
            { bottles: 12, rows: 5, colors: 6 },
            { bottles: 12, rows: 5, colors: 7 },
        ];

        let currentLevel = 0;
        let moves = 0;
        let selectedBottle = null;
        let bottles = [];
        let completedLevels = [];

        function initGame() {
            loadCompletedLevels();
            setupLevel(currentLevel);
        }

        function loadCompletedLevels() {
            const saved = localStorage.getItem('waterSortCompleted');
            if (saved) {
                completedLevels = JSON.parse(saved);
            } else {
                completedLevels = [];
            }
        }

        function saveCompletedLevel(levelIndex, stars) {
            if (!completedLevels[levelIndex] || stars > completedLevels[levelIndex]) {
                completedLevels[levelIndex] = stars;
                localStorage.setItem('waterSortCompleted', JSON.stringify(completedLevels));
            }
        }

        function setupLevel(levelIndex) {
            const level = LEVELS[levelIndex];
            if (!level) {
                alert('已完成所有关卡！');
                return;
            }

            currentLevel = levelIndex;
            moves = 0;
            selectedBottle = null;

            document.getElementById('level-num').textContent = levelIndex + 1;
            document.getElementById('moves-num').textContent = moves;

            createBottles(level);
            renderBottles();
        }

        function createBottles(level) {
            const { bottles: numBottles, rows, colors } = level;
            const colorGroups = [];

            for (let i = 0; i < colors; i++) {
                for (let j = 0; j < rows; j++) {
                    colorGroups.push(COLORS[i]);
                }
            }

            shuffleArray(colorGroups);

            const filledBottles = colors;
            const emptyBottles = numBottles - filledBottles;

            bottles = [];
            let colorIndex = 0;

            for (let i = 0; i < filledBottles; i++) {
                const bottle = [];
                const needed = rows;
                for (let j = 0; j < needed && colorIndex < colorGroups.length; j++) {
                    bottle.push(colorGroups[colorIndex++]);
                }
                shuffleArray(bottle);
                bottles.push(bottle);
            }

            for (let i = 0; i < emptyBottles; i++) {
                bottles.push([]);
            }

            shuffleArray(bottles);

            if (!isSolvable()) {
                createBottles(level);
            }
        }

        function isSolvable() {
            const colorCounts = {};
            const rows = LEVELS[currentLevel].rows;

            for (const bottle of bottles) {
                for (const color of bottle) {
                    colorCounts[color] = (colorCounts[color] || 0) + 1;
                }
            }

            for (const count of Object.values(colorCounts)) {
                if (count !== rows) {
                    return false;
                }
            }

            return true;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function renderBottles() {
            const container = document.getElementById('bottle-container');
            container.innerHTML = '';

            bottles.forEach((bottle, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = `bottle-wrapper${selectedBottle === index ? ' selected' : ''}`;
                wrapper.onclick = () => selectBottle(index);

                const bottleEl = document.createElement('div');
                bottleEl.className = `bottle${bottle.length === 0 ? ' empty-bottle' : ''}`;

                const neck = document.createElement('div');
                neck.className = 'neck';
                bottleEl.appendChild(neck);

                const rows = LEVELS[currentLevel].rows;
                bottle.forEach((color, i) => {
                    const liquid = document.createElement('div');
                    liquid.className = 'liquid';
                    liquid.style.backgroundColor = color;
                    liquid.style.height = `${(100 / rows) * (i + 1)}%`;
                    bottleEl.appendChild(liquid);
                });

                wrapper.appendChild(bottleEl);

                const label = document.createElement('div');
                label.className = 'bottle-label';
                label.textContent = `${bottle.length}/${rows}`;
                wrapper.appendChild(label);

                container.appendChild(wrapper);
            });
        }

        function selectBottle(index) {
            if (selectedBottle === null) {
                if (bottles[index].length === 0) {
                    return;
                }
                selectedBottle = index;
                renderBottles();
            } else if (selectedBottle === index) {
                selectedBottle = null;
                renderBottles();
            } else {
                tryPour(selectedBottle, index);
            }
        }

        function tryPour(from, to) {
            const fromBottle = bottles[from];
            const toBottle = bottles[to];
            const rows = LEVELS[currentLevel].rows;

            if (toBottle.length >= rows) return;

            if (fromBottle.length === 0) return;

            const topColor = fromBottle[fromBottle.length - 1];

            if (toBottle.length === 0 || toBottle[toBottle.length - 1] === topColor) {
                const maxPour = rows - toBottle.length;
                let pourCount = 0;

                for (let i = fromBottle.length - 1; i >= 0 && pourCount < maxPour; i--) {
                    if (fromBottle[i] === topColor) {
                        pourCount++;
                    } else {
                        break;
                    }
                }

                for (let i = 0; i < pourCount; i++) {
                    toBottle.push(fromBottle.pop());
                }

                moves++;
                document.getElementById('moves-num').textContent = moves;
                selectedBottle = null;
                renderBottles();

                checkWin();
            }
        }

        function checkWin() {
            const rows = LEVELS[currentLevel].rows;
            const colors = LEVELS[currentLevel].colors;

            let completedBottles = 0;

            for (const bottle of bottles) {
                if (bottle.length === 0) continue;

                if (bottle.length === rows) {
                    const color = bottle[0];
                    const isPure = bottle.every(c => c === color);
                    if (isPure) completedBottles++;
                }
            }

            if (completedBottles === colors) {
                setTimeout(() => showWinModal(), 300);
            }
        }

        function showWinModal() {
            const stars = calculateStars();
            saveCompletedLevel(currentLevel, stars);

            document.getElementById('stars').innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const star = document.createElement('span');
                star.className = `star${i < stars ? ' active' : ''}`;
                star.textContent = '⭐';
                document.getElementById('stars').appendChild(star);
            }

            document.getElementById('modal-message').textContent = `你用了 ${moves} 步完成本关！`;
            document.getElementById('modal-overlay').classList.add('show');
        }

        function calculateStars() {
            const rows = LEVELS[currentLevel].rows;
            const colors = LEVELS[currentLevel].colors;
            const minMoves = colors * (rows - 1);
            const maxMoves = minMoves * 2;

            if (moves <= minMoves) return 3;
            if (moves <= maxMoves) return 2;
            return 1;
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        function showLevelSelector() {
            const selector = document.getElementById('level-selector');
            selector.innerHTML = '';

            LEVELS.forEach((_, index) => {
                const levelItem = document.createElement('div');
                levelItem.className = 'level-item';
                
                if (index === currentLevel) {
                    levelItem.classList.add('current');
                }
                
                if (index > 0 && !completedLevels[index - 1] && index !== currentLevel) {
                    levelItem.classList.add('locked');
                    levelItem.textContent = '🔒';
                } else {
                    levelItem.textContent = index + 1;
                    levelItem.onclick = () => {
                        setupLevel(index);
                        closeLevelModal();
                    };
                    
                    if (completedLevels[index]) {
                        levelItem.classList.add('completed');
                    }
                }

                selector.appendChild(levelItem);
            });

            document.getElementById('level-modal-overlay').classList.add('show');
        }

        function closeLevelModal() {
            document.getElementById('level-modal-overlay').classList.remove('show');
        }

        function resetLevel() {
            setupLevel(currentLevel);
        }

        function nextLevel() {
            const nextIdx = currentLevel + 1;
            if (nextIdx < LEVELS.length) {
                setupLevel(nextIdx);
            } else {
                alert('🎉 恭喜你完成了所有关卡！');
            }
        }

        initGame();
    </script>
</body>
</html>
